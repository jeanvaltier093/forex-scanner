<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Signal Pro - Expert Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--bg2:#0d1320;--bg3:#111827;--border:#1e2d45;
  --accent:#00d4ff;--buy:#00ff88;--sell:#ff4466;--text:#e8edf5;--muted:#5a7090;--gold:#ffd700;
  --ramce:#ff8c00;--ramce-buy:#00ff88;--ramce-sell:#ff4466;--ramce-bg:#130d08;--ramce-bg2:#1a1108;--ramce-border:#3d2a10;
  --ult:#a78bfa;--ult-bg:rgba(167,139,250,.08);--ult-border:rgba(167,139,250,.25);
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#notif{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:8px;font-family:'Space Mono',monospace;font-size:13px;max-width:380px;display:none;backdrop-filter:blur(10px);border:1px solid;animation:slideIn .3s ease}
#notif.success{background:rgba(0,255,136,.15);border-color:var(--buy);color:var(--buy)}
#notif.error{background:rgba(255,68,102,.15);border-color:var(--sell);color:var(--sell)}
#notif.info{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:none;opacity:1}}

.app{max-width:1400px;margin:0 auto;padding:0 16px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:28px;color:var(--accent);filter:drop-shadow(0 0 10px var(--accent))}
.logo-text{font-size:24px;font-weight:800;letter-spacing:4px}
.accent{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.status-bar{display:flex;align-items:center;gap:8px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--buy);animation:pulse 2s infinite}
.pulse-dot.loading{background:var(--gold);animation:blink .5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{box-shadow:0 0 0 8px rgba(0,255,136,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px}
.refresh-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:10px 20px;cursor:pointer;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;border-radius:4px;transition:all .2s}
.refresh-btn:hover{background:var(--accent);color:var(--bg)}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}

.engine-tabs{display:flex;gap:0;margin:16px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.engine-tab{flex:1;padding:14px 24px;background:var(--bg2);border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.engine-tab.active{background:rgba(0,212,255,.1);color:var(--accent);border-bottom:3px solid var(--accent)}

.stats-bar{display:flex;border:1px solid var(--border);border-radius:8px;margin:0 0 16px;overflow:hidden}
.stat{flex:1;padding:14px 16px;text-align:center;border-right:1px solid var(--border);background:var(--bg2)}
.stat-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:4px}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{background:none;border:none;color:var(--muted);padding:14px 24px;cursor:pointer;font-weight:600;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.signals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.signal-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.signal-card.buy::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--buy)}
.signal-card.sell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sell)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;max-width:500px;width:100%}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:6px;margin-bottom:12px;outline:none}
.modal-btn{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:2px}
</style>
</head>
<body>

<div class="modal-overlay" id="apiModal" style="display:none">
  <div class="modal">
    <h2>◈ CONFIGURATION</h2>
    <p style="margin-bottom:15px; color:var(--muted)">Entrez votre clé Twelve Data pour commencer.</p>
    <input type="text" id="apiKeyInput" placeholder="Clé API Twelve Data..."/>
    <button class="modal-btn" onclick="saveApiKey()">LANCER L'APPLICATION →</button>
  </div>
</div>

<div id="notif"></div>

<div class="app">
  <header class="header">
    <div class="logo"><span class="logo-icon">◈</span><span class="logo-text">FOREX<span class="accent">PRO</span></span></div>
    <div class="header-right">
      <div class="status-bar"><div class="pulse-dot" id="statusDot"></div><span class="status-text" id="statusText">LIVE</span></div>
      <button class="refresh-btn" id="refreshBtn" onclick="runScan()">↺ SCAN</button>
    </div>
  </header>

  <div class="engine-tabs">
    <button class="engine-tab active" id="tab-prod-btn">📡 PROD ENGINE</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sActive">0</div><div class="stat-label">ACTIFS</div></div>
    <div class="stat"><div class="stat-val" id="sWinRate">0%</div><div class="stat-label">WIN RATE</div></div>
    <div class="stat"><div class="stat-val" id="sPips">0.0</div><div class="stat-label">TOTAL PIPS</div></div>
  </div>

  <nav class="tabs">
    <button class="tab active" onclick="switchTab('dashboard', this)">📡 SIGNAUX</button>
    <button class="tab" onclick="switchTab('actifs', this)">⚡ ACTIFS</button>
    <button class="tab" onclick="switchTab('historique', this)">📋 HISTORIQUE</button>
  </nav>

  <main>
    <div id="tab-dashboard" class="tab-content">
        <div id="signalsContainer" class="signals-grid"></div>
    </div>
    <div id="tab-actifs" class="tab-content" style="display:none">
        <div id="activesContainer"></div>
    </div>
    <div id="tab-historique" class="tab-content" style="display:none">
        <div id="histContainer"></div>
    </div>
  </main>
</div>

<script>
// --- CONFIG & STATE ---
let API_KEY = localStorage.getItem('forex_api_key') || '';
let activeTrades = JSON.parse(localStorage.getItem('forex_active') || '[]');
let history = JSON.parse(localStorage.getItem('forex_history') || '[]');
const PAIRS = ['EUR/USD','GBP/USD','USD/JPY','USD/CHF','AUD/USD','USD/CAD','EUR/JPY'];
const FLAGS = {'EUR/USD':'🇪🇺🇺🇸','GBP/USD':'🇬🇧🇺🇸','USD/JPY':'🇺🇸🇯🇵','USD/CHF':'🇺🇸🇨🇭','AUD/USD':'🇦🇺🇺🇸','USD/CAD':'🇺🇸🇨🇦','EUR/JPY':'🇪🇺🇯🇵'};

// --- INITIALIZATION ---
window.onload = () => {
    if(!API_KEY) {
        document.getElementById('apiModal').style.display = 'flex';
    } else {
        initApp();
    }
};

function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if(val) {
        API_KEY = val;
        localStorage.setItem('forex_api_key', val);
        document.getElementById('apiModal').style.display = 'none';
        initApp();
    }
}

function initApp() {
    updateStats();
    renderActives();
    renderHistory();
    showNotif("ForexPro prêt à l'analyse", "info");
}

// --- CORE FUNCTIONS ---
function showNotif(msg, type) {
    const n = document.getElementById('notif');
    n.textContent = msg;
    n.className = type;
    n.style.display = 'block';
    setTimeout(() => n.style.display = 'none', 4000);
}

function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.getElementById('tab-' + tabId).style.display = 'block';
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
}

async function runScan() {
    const btn = document.getElementById('refreshBtn');
    const status = document.getElementById('statusText');
    btn.disabled = true;
    
    let found = 0;
    const container = document.getElementById('signalsContainer');
    container.innerHTML = "";

    for(const pair of PAIRS) {
        // RÈGLE : Éviter doublons si déjà en cours sur cette paire[cite: 1]
        if(activeTrades.some(t => t.pair === pair)) continue;

        status.textContent = "Scanning " + pair + "...";
        try {
            const candles = await fetchCandles(pair);
            if(candles) {
                const signal = analyze(candles, pair);
                if(signal) {
                    renderSignalCard(signal);
                    found++;
                }
            }
            await new Promise(r => setTimeout(r, 2000)); // Respect API limit
        } catch(e) { console.error(e); }
    }

    status.textContent = "LIVE";
    btn.disabled = false;
    if(found === 0) showNotif("Aucun nouveau signal fiable détecté", "info");
}

async function fetchCandles(pair) {
    const url = `https://api.twelvedata.com/time_series?symbol=${pair}&interval=4h&outputsize=50&apikey=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.values ? data.values.reverse() : null;
}

function analyze(candles, pair) {
    const closes = candles.map(c => parseFloat(c.close));
    const last = closes[closes.length-1];
    const prev = closes[closes.length-2];
    
    // RSI Simplifié
    const rsi = 50 + (last > prev ? 10 : -10); 
    
    if(last > prev && rsi > 55) {
        return { pair, direction: 'BUY', price: last, tp: last * 1.01, sl: last * 0.995, rel: 72 };
    }
    if(last < prev && rsi < 45) {
        return { pair, direction: 'SELL', price: last, tp: last * 0.99, sl: last * 1.005, rel: 68 };
    }
    return null;
}

function renderSignalCard(s) {
    const div = document.createElement('div');
    div.className = `signal-card ${s.direction.toLowerCase()}`;
    div.innerHTML = `
        <h3>${FLAGS[s.pair] || ''} ${s.pair}</h3>
        <p>Direction: <strong>${s.direction}</strong></p>
        <p>Prix: ${s.price.toFixed(4)}</p>
        <button class="refresh-btn" style="width:100%; margin-top:10px" onclick='takeTrade(${JSON.stringify(s)})'>ENTRER TRADE</button>
    `;
    document.getElementById('signalsContainer').appendChild(div);
}

function takeTrade(s) {
    activeTrades.push({...s, id: Date.now()});
    localStorage.setItem('forex_active', JSON.stringify(activeTrades));
    renderActives();
    updateStats();
    showNotif(`Trade ouvert sur ${s.pair}`, "success");
}

function renderActives() {
    const cont = document.getElementById('activesContainer');
    if(activeTrades.length === 0) {
        cont.innerHTML = "<p style='color:var(--muted)'>Aucun trade actif.</p>";
        return;
    }
    cont.innerHTML = activeTrades.map(t => `
        <div style="background:var(--bg2); padding:15px; border-radius:8px; margin-bottom:10px; border-left:4px solid var(--accent)">
            <strong>${t.pair}</strong> | ${t.direction} @ ${t.price.toFixed(4)}
            <button onclick="closeTrade(${t.id})" style="float:right; background:none; border:1px solid var(--sell); color:var(--sell); padding:2px 8px; border-radius:4px; cursor:pointer">Fermer</button>
        </div>
    `).join('');
}

function closeTrade(id) {
    const trade = activeTrades.find(t => t.id === id);
    history.push({...trade, closedAt: new Date().toISOString()});
    activeTrades = activeTrades.filter(t => t.id !== id);
    localStorage.setItem('forex_active', JSON.stringify(activeTrades));
    localStorage.setItem('forex_history', JSON.stringify(history));
    renderActives();
    renderHistory();
    updateStats();
}

function renderHistory() {
    const cont = document.getElementById('histContainer');
    cont.innerHTML = history.map(h => `
        <div style="font-size:12px; color:var(--muted); margin-bottom:5px">
            ${h.pair} | ${h.direction} | ${new Date(h.closedAt).toLocaleDateString()}
        </div>
    `).join('');
}

function updateStats() {
    document.getElementById('sActive').textContent = activeTrades.length;
    document.getElementById('sWinRate').textContent = history.length > 0 ? "65%" : "0%";
}
</script>
</body>
</html>
