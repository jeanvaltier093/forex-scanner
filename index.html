<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Signal Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--bg2:#0d1320;--bg3:#111827;--border:#1e2d45;
  --accent:#00d4ff;--buy:#00ff88;--sell:#ff4466;--text:#e8edf5;--muted:#5a7090;--gold:#ffd700;
  --ramce:#ff8c00;--ramce-buy:#00ff88;--ramce-sell:#ff4466;--ramce-bg:#130d08;--ramce-bg2:#1a1108;--ramce-border:#3d2a10;
  --ult:#a78bfa;--ult-bg:rgba(167,139,250,.08);--ult-border:rgba(167,139,250,.25);
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── NOTIF ─── */
#notif{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:8px;font-family:'Space Mono',monospace;font-size:13px;max-width:380px;display:none;backdrop-filter:blur(10px);border:1px solid;animation:slideIn .3s ease}
#notif.success{background:rgba(0,255,136,.15);border-color:var(--buy);color:var(--buy)}
#notif.error{background:rgba(255,68,102,.15);border-color:var(--sell);color:var(--sell)}
#notif.info{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:none;opacity:1}}

.app{max-width:1400px;margin:0 auto;padding:0 16px}

/* ─── HEADER ─── */
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:28px;color:var(--accent);filter:drop-shadow(0 0 10px var(--accent))}
.logo-text{font-size:24px;font-weight:800;letter-spacing:4px}
.accent{color:var(--accent)}
.header-left{display:flex;align-items:center;gap:24px}
.header-right{display:flex;align-items:center;gap:12px}
.status-bar{display:flex;align-items:center;gap:8px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--buy);animation:pulse 2s infinite}
.pulse-dot.loading{background:var(--gold);animation:blink .5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{box-shadow:0 0 0 8px rgba(0,255,136,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px}
.countdown-box{text-align:center}
.countdown-label{font-size:9px;color:var(--muted);letter-spacing:2px}
.countdown-value{font-family:'Space Mono',monospace;font-size:20px;color:var(--accent)}
.refresh-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:10px 20px;cursor:pointer;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;border-radius:4px;transition:all .2s}
.refresh-btn:hover{background:var(--accent);color:var(--bg)}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ramce{border-color:var(--ramce);color:var(--ramce)}
.btn-ramce:hover{background:var(--ramce);color:var(--bg)}

/* ─── MOTEUR SELECTOR ─── */
.engine-tabs{display:flex;gap:0;margin:16px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.engine-tab{flex:1;padding:14px 24px;background:var(--bg2);border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.engine-tab.prod-tab{color:var(--muted);border-right:1px solid var(--border)}
.engine-tab.prod-tab.active{background:rgba(0,212,255,.1);color:var(--accent);border-bottom:3px solid var(--accent)}
.engine-tab.ramce-tab{color:var(--muted)}
.engine-tab.ramce-tab.active{background:rgba(255,140,0,.1);color:var(--ramce);border-bottom:3px solid var(--ramce)}
.engine-badge{font-family:'Space Mono',monospace;font-size:10px;padding:2px 8px;border-radius:3px}
.prod-badge{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.ramce-badge{background:rgba(255,140,0,.15);color:var(--ramce);border:1px solid rgba(255,140,0,.3)}

/* ─── STATS BAR ─── */
.stats-bar{display:flex;border:1px solid var(--border);border-radius:8px;margin:0 0 16px;overflow:hidden}
.stat{flex:1;padding:14px 16px;text-align:center;border-right:1px solid var(--border);background:var(--bg2)}
.stat:last-child{border-right:none}
.stat-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:4px}
.stat.good .stat-val{color:var(--buy)}.stat.bad .stat-val{color:var(--sell)}

/* RAMCE stats */
.stats-bar.ramce-stats{border-color:var(--ramce-border)}
.stats-bar.ramce-stats .stat{background:var(--ramce-bg2);border-right-color:var(--ramce-border)}
.stats-bar.ramce-stats .stat-val{color:var(--ramce)}

/* ─── TABS INTERNES ─── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{background:none;border:none;color:var(--muted);padding:14px 24px;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tabs.ramce-tabs .tab.active{color:var(--ramce);border-bottom-color:var(--ramce)}
.tabs.ramce-tabs{border-bottom-color:var(--ramce-border)}

/* ─── LOADING ─── */
.loading-bar{height:2px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden;display:none}
.loading-fill{height:100%;background:var(--accent);animation:load 1.5s ease infinite}
.loading-fill.ramce-fill{background:var(--ramce)}
@keyframes load{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-sub{font-size:13px;margin-top:8px;opacity:.6}

/* ─── SIGNAL CARDS PROD ─── */
.signals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.signal-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.signal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.signal-card.buy::before{background:linear-gradient(90deg,var(--buy),transparent)}
.signal-card.sell::before{background:linear-gradient(90deg,var(--sell),transparent)}
.signal-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}

/* ─── SIGNAL CARDS RAMCE ─── */
.signal-card.ramce{background:var(--ramce-bg2);border-color:var(--ramce-border)}
.confluence-badge{font-family:'Space Mono',monospace;font-size:11px;padding:3px 10px;background:rgba(255,140,0,.15);border:1px solid rgba(255,140,0,.3);color:var(--ramce);border-radius:3px}
.regime-badge{font-family:'Space Mono',monospace;font-size:10px;padding:2px 8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);border-radius:3px}

.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pair-info{display:flex;align-items:center;gap:8px}
.flag{font-size:18px}.pair-name{font-size:18px;font-weight:800;letter-spacing:2px}
.dir-badge{padding:5px 12px;border-radius:4px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1px}
.dir-badge.buy{background:rgba(0,255,136,.15);color:var(--buy);border:1px solid var(--buy)}
.dir-badge.sell{background:rgba(255,68,102,.15);color:var(--sell);border:1px solid var(--sell)}
.reliability-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.rel-label{font-size:9px;color:var(--muted);letter-spacing:2px;white-space:nowrap}
.rel-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.rel-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--buy));border-radius:2px}
.rel-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent)}

.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.price-item{background:var(--bg3);border-radius:6px;padding:10px;text-align:center}
.price-label{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:4px}
.price-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.price-item.tp .price-val{color:var(--buy)}.price-item.sl .price-val{color:var(--sell)}
.indicators-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ind{font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;background:var(--bg3);border-radius:3px;color:var(--muted);border:1px solid var(--border)}
.reasons{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.reason-tag{font-size:10px;padding:3px 8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:3px;color:var(--accent)}
.trade-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--accent);color:var(--accent);cursor:pointer;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;border-radius:6px;transition:all .2s}
.trade-btn:hover{background:var(--accent);color:var(--bg)}

/* ─── TRADES LIST ─── */
.trades-list{display:flex;flex-direction:column;gap:12px}
.trade-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:10px;border-left:3px solid}
.trade-row.buy{border-left-color:var(--buy)}.trade-row.sell{border-left-color:var(--sell)}
.trade-main{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.trade-pair{font-size:16px;font-weight:800;letter-spacing:2px}
.trade-levels{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.tp-lv{font-family:'Space Mono',monospace;font-size:12px;color:var(--buy)}
.sl-lv{font-family:'Space Mono',monospace;font-size:12px;color:var(--sell)}
.rel-badge{font-size:11px;color:var(--accent);background:rgba(0,212,255,.1);padding:2px 8px;border-radius:3px}
.trade-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.trade-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.pause-badge{font-size:11px;color:var(--gold);background:rgba(255,215,0,0.1);padding:2px 8px;border-radius:3px}

/* ─── HISTORY ─── */
.hist-summary{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.sum-stat{flex:1;padding:16px;text-align:center;background:var(--bg2);border-right:1px solid var(--border)}
.sum-stat:last-child{border-right:none}
.sum-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700}
.sum-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:4px}
.hist-table{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tbl-header{display:grid;grid-template-columns:1.5fr .7fr 1fr 1fr .7fr 1fr 1.2fr;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:9px;color:var(--muted);letter-spacing:2px;font-family:'Space Mono',monospace}
.hist-row{display:grid;grid-template-columns:1.5fr .7fr 1fr 1fr .7fr 1fr 1.2fr;padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-family:'Space Mono',monospace;align-items:center}
.buy-txt{color:var(--buy)}.sell-txt{color:var(--sell)}
.res-badge{padding:3px 8px;border-radius:3px;font-size:11px}
.res-badge.win{background:rgba(0,255,136,.15);color:var(--buy)}.res-badge.loss{background:rgba(255,68,102,.15);color:var(--sell)}

/* ─── MODALS ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;max-width:500px;width:100%}
.modal h2{font-size:20px;font-weight:800;margin-bottom:8px;color:var(--accent)}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:6px;font-family:'Space Mono',monospace;font-size:13px;margin-bottom:12px;outline:none}
.modal-btn{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px}

/* MOBILE BOT NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:2000;background:var(--bg2);border-top:1px solid var(--border);padding:10px 0}
@media(max-width:768px){
  .stats-bar{flex-wrap:wrap}.stat{min-width:50%;border-bottom:1px solid var(--border)}
  .tbl-header,.hist-row{grid-template-columns:1fr .5fr .8fr .8fr .6fr .8fr}.tbl-header span:last-child,.hist-row span:last-child{display:none}
}
</style>
</head>
<body>

<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h2>◈ FOREX SIGNAL PRO</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px">Bienvenue. Entrez votre clé API Twelve Data pour commencer.</p>
    <input type="text" id="apiKeyInput" placeholder="Clé API..."/>
    <button class="modal-btn" onclick="saveApiKey()">DÉMARRER L'APPLICATION →</button>
  </div>
</div>

<div id="notif"></div>

<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo"><span class="logo-icon">◈</span><span class="logo-text">FOREX<span class="accent">PRO</span></span></div>
      <div class="status-bar"><div class="pulse-dot" id="statusDot"></div><span class="status-text" id="statusText">LIVE</span></div>
    </div>
    <div class="header-right">
      <div class="countdown-box"><div class="countdown-label">PROCHAIN SCAN</div><div class="countdown-value" id="countdown">10:00</div></div>
      <button class="refresh-btn" id="refreshBtn" onclick="runScan()">↺ SCAN</button>
    </div>
  </header>

  <div class="engine-tabs">
    <button class="engine-tab active" onclick="switchEngine('prod', this)">📡 PROD</button>
    <button class="engine-tab" onclick="switchEngine('ult', this)">⬡ ULTIMATE</button>
    <button class="engine-tab" onclick="switchEngine('ramce', this)">🔬 RAMCE v4</button>
  </div>

  <div id="section-prod">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="sActive">0</div><div class="stat-label">ACTIFS</div></div>
      <div class="stat"><div class="stat-val" id="sWinRate">0%</div><div class="stat-label">WIN RATE</div></div>
      <div class="stat"><div class="stat-val" id="sPips">0.0</div><div class="stat-label">PIPS</div></div>
    </div>
    <nav class="tabs">
      <button class="tab active" onclick="showTab('dashboard',this)">📡 SIGNAUX</button>
      <button class="tab" onclick="showTab('actifs',this)">⚡ ACTIFS</button>
      <button class="tab" onclick="showTab('historique',this)">📋 HISTORIQUE</button>
    </nav>
    <main id="main-content">
        <div id="prod-dashboard"><div id="signalsContainer" class="signals-grid"></div></div>
        <div id="prod-actifs" style="display:none"><div id="activesContainer" class="trades-list"></div></div>
        <div id="prod-historique" style="display:none"><div id="histContainer"></div></div>
    </main>
  </div>
</div>

<script>
// ─── CONFIG & STATE ───
let API_KEY = localStorage.getItem('forex_api_key') || '';
let activeTrades = JSON.parse(localStorage.getItem('forex_active') || '[]');
let history = JSON.parse(localStorage.getItem('forex_history') || '[]');
const PAIRS = ['EUR/USD','GBP/USD','USD/JPY','USD/CHF','AUD/USD','NZD/USD','USD/CAD','EUR/GBP'];
const FLAGS = {'EUR/USD':'🇪🇺🇺🇸','GBP/USD':'🇬🇧🇺🇸','USD/JPY':'🇺🇸🇯🇵','USD/CHF':'🇺🇸🇨🇭','AUD/USD':'🇦🇺🇺🇸','NZD/USD':'🇳🇿🇺🇸','USD/CAD':'🇺🇸🇨🇦','EUR/GBP':'🇪🇺🇬🇧'};

// ─── INITIALIZATION ───
window.onload = () => {
    if(!API_KEY) {
        document.getElementById('apiModal').style.display = 'flex';
    } else {
        document.getElementById('apiModal').style.display = 'none';
        initApp();
    }
};

function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if(val) {
        API_KEY = val;
        localStorage.setItem('forex_api_key', val);
        document.getElementById('apiModal').style.display = 'none';
        initApp();
    }
}

function initApp() {
    updateStats();
    renderActives();
    renderHistory();
    startCountdown();
    showNotif("Application prête", "success");
}

// ─── CORE FUNCTIONS ───
function showNotif(msg, type) {
    const n = document.getElementById('notif');
    n.textContent = msg;
    n.className = type;
    n.style.display = 'block';
    setTimeout(() => n.style.display = 'none', 3000);
}

function switchEngine(engine, btn) {
    document.querySelectorAll('.engine-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    showNotif("Moteur " + engine.toUpperCase() + " activé", "info");
}

function showTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    ['dashboard', 'actifs', 'historique'].forEach(id => {
        document.getElementById('prod-' + id).style.display = (id === tab) ? 'block' : 'none';
    });
}

// ─── SCAN ENGINE ───
async function runScan() {
    const btn = document.getElementById('refreshBtn');
    const dot = document.getElementById('statusDot');
    btn.disabled = true;
    dot.className = 'pulse-dot loading';
    
    showNotif("Analyse du marché en cours...", "info");
    
    // Simulation de scan (Analyse réelle via Twelve Data)
    for(const pair of PAIRS) {
        try {
            const resp = await fetch(`https://api.twelvedata.com/time_series?symbol=${pair}&interval=4h&outputsize=50&apikey=${API_KEY}`);
            const data = await resp.json();
            if(data.values) {
                analyzePair(pair, data.values);
            }
        } catch(e) { console.error(e); }
    }
    
    btn.disabled = false;
    dot.className = 'pulse-dot';
    showNotif("Scan terminé", "success");
}

function analyzePair(pair, values) {
    const close = parseFloat(values[0].close);
    const prev = parseFloat(values[1].close);
    const diff = ((close - prev) / prev) * 100;
    
    // Logique simplifiée pour l'exemple (remplacez par vos algos MACD/RSI)
    if(Math.abs(diff) > 0.1) {
        const dir = diff > 0 ? 'BUY' : 'SELL';
        createSignal(pair, dir, close);
    }
}

function createSignal(pair, dir, price) {
    const container = document.getElementById('signalsContainer');
    const sl = dir === 'BUY' ? price * 0.995 : price * 1.005;
    const tp = dir === 'BUY' ? price * 1.01 : price * 0.99;
    
    const card = document.createElement('div');
    card.className = `signal-card ${dir.toLowerCase()}`;
    card.innerHTML = `
        <div class="card-header">
            <span class="pair-name">${FLAGS[pair] || ''} ${pair}</span>
            <span class="dir-badge ${dir.toLowerCase()}">${dir}</span>
        </div>
        <div class="price-grid">
            <div class="price-item"><div>ENTRÉE</div><div class="price-val">${price.toFixed(4)}</div></div>
            <div class="price-item tp"><div>TP</div><div class="price-val">${tp.toFixed(4)}</div></div>
            <div class="price-item sl"><div>SL</div><div class="price-val">${sl.toFixed(4)}</div></div>
        </div>
        <button class="trade-btn" onclick="openTrade('${pair}', '${dir}', ${price}, ${tp}, ${sl})">OUVRIR POSITION</button>
    `;
    container.prepend(card);
}

function openTrade(pair, dir, entry, tp, sl) {
    const trade = {
        id: Date.now(),
        pair, dir, entry, tp, sl,
        time: new Date().toLocaleTimeString()
    };
    activeTrades.push(trade);
    localStorage.setItem('forex_active', JSON.stringify(activeTrades));
    renderActives();
    updateStats();
    showNotif(`Trade ouvert: ${pair}`, "success");
}

function renderActives() {
    const container = document.getElementById('activesContainer');
    container.innerHTML = activeTrades.map(t => `
        <div class="trade-row ${t.dir.toLowerCase()}">
            <div class="trade-main">
                <span class="trade-pair">${t.pair}</span>
                <span class="dir-badge ${t.dir.toLowerCase()}">${t.dir}</span>
                <span>Entrée: ${t.entry.toFixed(4)}</span>
            </div>
            <div class="trade-meta">
                <button onclick="closeTrade(${t.id}, 'WIN')" style="color:var(--buy);background:none;border:none;cursor:pointer">Clôturer TP</button>
                <button onclick="closeTrade(${t.id}, 'LOSS')" style="color:var(--sell);background:none;border:none;cursor:pointer">Clôturer SL</button>
            </div>
        </div>
    `).join('');
}

function closeTrade(id, result) {
    const idx = activeTrades.findIndex(t => t.id === id);
    if(idx > -1) {
        const t = activeTrades[idx];
        const pips = result === 'WIN' ? 50 : -30;
        history.unshift({...t, result, pips, date: new Date().toLocaleDateString()});
        activeTrades.splice(idx, 1);
        localStorage.setItem('forex_active', JSON.stringify(activeTrades));
        localStorage.setItem('forex_history', JSON.stringify(history));
        renderActives();
        renderHistory();
        updateStats();
    }
}

function renderHistory() {
    const container = document.getElementById('histContainer');
    if(!history.length) return;
    
    container.innerHTML = `
        <div class="hist-table">
            <div class="tbl-header">
                <span>PAIRE</span><span>DIR</span><span>RESULTAT</span><span>PIPS</span><span>DATE</span>
            </div>
            ${history.map(h => `
                <div class="hist-row">
                    <span>${h.pair}</span>
                    <span class="${h.dir.toLowerCase()}-txt">${h.dir}</span>
                    <span><span class="res-badge ${h.result.toLowerCase()}">${h.result}</span></span>
                    <span class="${h.pips > 0 ? 'buy-txt' : 'sell-txt'}">${h.pips}</span>
                    <span>${h.date}</span>
                </div>
            `).join('')}
        </div>
    `;
}

function updateStats() {
    const winRate = history.length ? (history.filter(h => h.result === 'WIN').length / history.length * 100).toFixed(1) : 0;
    const totalPips = history.reduce((acc, h) => acc + h.pips, 0).toFixed(1);
    
    document.getElementById('sActive').textContent = activeTrades.length;
    document.getElementById('sWinRate').textContent = winRate + '%';
    document.getElementById('sPips').textContent = totalPips;
}

function startCountdown() {
    setInterval(() => {
        let timer = document.getElementById('countdown').textContent.split(':');
        let min = parseInt(timer[0]);
        let sec = parseInt(timer[1]);
        if(sec === 0) {
            if(min === 0) {
                runScan();
                min = 10; sec = 0;
            } else {
                min--; sec = 59;
            }
        } else {
            sec--;
        }
        document.getElementById('countdown').textContent = `${min}:${sec < 10 ? '0'+sec : sec}`;
    }, 1000);
}
</script>
</body>
</html>
